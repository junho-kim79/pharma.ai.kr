<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WithMed Group | AI Medical Network</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Noto+Serif+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
    body,html{ margin:0; padding:0; background:#000; font-family:'Noto Serif KR',serif; color:#fff; scroll-behavior:smooth; overflow-x:hidden; }

    #ticker { background:#0a0a0a; border-bottom:1px solid #1a1a1a; padding:8px 0; overflow:hidden; position:fixed; top:0; width:100%; z-index:200; }
    .ticker-wrap { display:flex; gap:60px; animation:tickerMove 30s linear infinite; white-space:nowrap; }
    .ticker-item { font-size:12px; font-family:'Cormorant Garamond',serif; letter-spacing:1px; }
    .ticker-item .t-name { color:#555; margin-right:8px; }
    .ticker-item .t-price { color:#fff; margin-right:6px; }
    .up{color:#ff4466;} .down{color:#4488ff;}
    @keyframes tickerMove { 0%{transform:translateX(0);} 100%{transform:translateX(-50%);} }

    #topNav { position:fixed; top:36px; left:50%; transform:translateX(-50%); display:flex; gap:22px; font-size:11px; letter-spacing:2px; z-index:100; background:rgba(0,0,0,0.6); padding:10px 20px; border-radius:30px; backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.1); font-family:'Cormorant Garamond',serif; }
    #topNav a { color:#aaa; text-decoration:none; transition:0.3s; font-weight:600; cursor:pointer; }
    #topNav a:hover { color:#00ffff; }
    #callBtn { position:fixed; right:30px; bottom:30px; background:#00ffff; color:#000; padding:12px 20px; border-radius:30px; font-weight:700; text-decoration:none; z-index:100; box-shadow:0 0 20px rgba(0,255,255,0.4); transition:0.3s; font-family:'Noto Serif KR',serif; }
    #callBtn:hover { transform:scale(1.05); background:#fff; }
    #musicBtn { position:fixed; left:30px; bottom:30px; background:rgba(0,0,0,0.7); color:#00ffff; padding:10px 16px; border-radius:30px; font-size:12px; font-weight:700; border:1px solid #00ffff; cursor:pointer; transition:0.3s; backdrop-filter:blur(10px); z-index:100; font-family:'Cormorant Garamond',serif; }
    #musicBtn:hover { background:#00ffff; color:#000; }

    #weatherWidget { position:fixed; right:30px; top:52px; z-index:99; background:rgba(0,0,0,0.6); border:1px solid #1a1a1a; border-radius:16px; padding:10px 16px; backdrop-filter:blur(10px); text-align:center; font-size:12px; color:#aaa; min-width:90px; }
    #weatherWidget .w-temp { font-size:22px; font-weight:700; color:#fff; font-family:'Cormorant Garamond',serif; }
    #weatherWidget .w-desc { font-size:11px; color:#555; margin-top:2px; }

    /* 인트로 */
    #introSection { height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; position:relative; overflow:hidden; }

    /* 브랜드 헤더 - 처음엔 중앙, 올라가서 고정 */
    #brandHeader {
        position:absolute;
        top:50%;
        left:50%;
        transform:translate(-50%, -50%);
        text-align:center;
        z-index:5;
        transition: top 1.2s cubic-bezier(0.4,0,0.2,1), transform 1.2s cubic-bezier(0.4,0,0.2,1);
        pointer-events:none;
    }
    #brandHeader.fixed {
        top:140px;
        transform:translate(-50%, 0);
    }
    #brandHeader .brand-ai {
        font-size:4rem;
        font-weight:900;
        letter-spacing:10px;
        font-family:'Cormorant Garamond',serif;
        opacity:0;
        transition:opacity 0.8s;
    }
    #brandHeader.visible .brand-ai { opacity:1; }
    #brandHeader .brand-sub {
        font-size:1.4rem;
        letter-spacing:8px;
        color:#00ffff;
        font-family:'Cormorant Garamond',serif;
        margin-top:8px;
        opacity:0;
        transition:opacity 0.8s 0.3s;
    }
    #brandHeader.visible .brand-sub { opacity:1; }
    #brandHeader .brand-slogan1 {
        font-size:0.95rem;
        font-weight:700;
        opacity:0;
        margin-top:14px;
        transition:opacity 0.8s 0.6s;
    }
    #brandHeader.visible .brand-slogan1 { opacity:0.8; }
    #brandHeader .brand-slogan2 {
        font-size:0.8rem;
        opacity:0;
        margin-top:6px;
        transition:opacity 0.8s 0.9s;
    }
    #brandHeader.visible .brand-slogan2 { opacity:0.4; }
    #brandHeader .brand-slogan3 {
        font-size:0.75rem;
        opacity:0;
        margin-top:4px;
        transition:opacity 0.8s 1.1s;
    }
    #brandHeader.visible .brand-slogan3 { opacity:0.35; }

    /* 회사명 */
    #companyList {
        position:absolute;
        top:50%;
        left:50%;
        transform:translate(-50%, -50%);
        text-align:center;
        z-index:4;
        opacity:0;
        transition:opacity 0.5s;
        width:100%;
    }
    #companyList.visible { opacity:1; }
    .company-item {
        font-size:2.8rem;
        font-weight:900;
        opacity:0;
        transform:translateY(20px);
        transition:opacity 0.6s, transform 0.6s;
        margin:6px 0;
        display:none;
    }
    .company-item.active {
        display:block;
    }
    .company-item.show {
        opacity:1;
        transform:translateY(0);
    }
    .company-sub {
        font-size:0.9rem;
        opacity:0.5;
        letter-spacing:2px;
        margin-top:4px;
    }

    #loadingWave { display:flex; gap:18px; position:absolute; bottom:80px; align-items:center; z-index:3; }
    .shape { opacity:0.3; display:flex; align-items:center; justify-content:center; }
    .shape:not(.triangle):not(.cross):not(.hexagon) { width:30px; height:30px; background:#fff; }
    .s-circle { border-radius:50%; animation:circleWave 2.2s infinite ease-in-out; }
    .s-diamond { animation:diamondWave 1.8s infinite ease-in-out; }
    .triangle { width:0; height:0; border-left:15px solid transparent; border-right:15px solid transparent; border-bottom:30px solid #fff; background:transparent !important; animation:triWave 3.1s infinite ease-in-out; }
    .cross { width:30px; height:30px; background:transparent !important; position:relative; animation:crossWave 2.6s infinite ease-in-out; }
    .cross::before { content:''; position:absolute; top:50%; left:0; transform:translateY(-50%); width:100%; height:8px; background:#fff; border-radius:4px; }
    .cross::after { content:''; position:absolute; left:50%; top:0; transform:translateX(-50%); height:100%; width:8px; background:#fff; border-radius:4px; }
    .hexagon { width:30px; height:30px; background:#fff; clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%); animation:hexWave 3.5s infinite ease-in-out; }
    @keyframes circleWave { 0%,100%{transform:translateY(0) scale(1);opacity:0.3;} 50%{transform:translateY(-30px) scale(1.2);opacity:1;background:#00ffff;box-shadow:0 0 15px #00ffff;} }
    @keyframes diamondWave { 0%,100%{transform:translateY(0) rotate(45deg) scale(1);opacity:0.3;} 50%{transform:translateY(-30px) rotate(225deg) scale(1.2);opacity:1;background:#00ffff;box-shadow:0 0 15px #00ffff;} }
    @keyframes triWave { 0%,100%{transform:translateY(0) rotate(0deg) scale(1);opacity:0.3;border-bottom-color:#fff;} 30%{transform:translateY(-20px) rotate(-20deg) scale(1.1);opacity:0.8;border-bottom-color:#00ffff;} 70%{transform:translateY(-28px) rotate(20deg) scale(1.2);opacity:1;border-bottom-color:#00ffff;filter:drop-shadow(0 0 10px #00ffff);} }
    @keyframes crossWave { 0%,100%{transform:translateY(0) rotate(0deg) scale(1);opacity:0.3;} 40%{transform:translateY(-25px) rotate(60deg) scale(1.1);opacity:0.7;} 50%{transform:translateY(-30px) rotate(90deg) scale(1.2);opacity:1;filter:drop-shadow(0 0 10px #00ffff);} }
    @keyframes hexWave { 0%,100%{transform:translateY(0) rotate(0deg) scale(1);opacity:0.3;} 50%{transform:translateY(-30px) rotate(-60deg) scale(1.2);opacity:1;background:#00ffff;filter:drop-shadow(0 0 10px #00ffff);} }

    #partnership { padding:120px 20px; text-align:center; border-top:1px solid #111; background:#000; }
    .p-card-container { display:flex; flex-wrap:wrap; justify-content:center; gap:25px; margin-top:60px; }
    .p-card { width:240px; background:#0a0a0a; border:1px solid #1a1a1a; border-radius:20px; overflow:hidden; transition:0.4s; cursor:pointer; }
    .p-card:hover { transform:translateY(-12px); border-color:#00ffff; box-shadow:0 20px 50px rgba(0,255,255,0.2); }
    .p-photo { height:280px; position:relative; overflow:hidden; }
    .p-photo video { width:100%; height:100%; object-fit:cover; display:block; position:absolute; top:0; left:0; transition:opacity 0.5s; }
    .p-photo img { width:100%; height:100%; object-fit:cover; display:block; position:absolute; top:0; left:0; opacity:0; transition:opacity 0.5s; }
    .p-card:hover .p-photo video { opacity:0; }
    .p-card:hover .p-photo img { opacity:1; }
    .p-content { padding:20px; text-align:left; position:relative; z-index:1; }
    .p-tag { font-size:10px; font-weight:800; padding:3px 8px; border-radius:4px; display:inline-block; margin-bottom:10px; font-family:'Cormorant Garamond',serif; letter-spacing:2px; }
    .tag-wm{background:#fff;color:#000;} .tag-ik{background:#00ffff;color:#000;} .tag-ys{background:#a0ff40;color:#000;} .tag-zb{background:#ff8040;color:#000;} .tag-kb{background:#ffcc00;color:#000;}
    .p-name { font-size:18px; font-weight:700; margin:0 0 5px 0; }
    .p-desc { font-size:13px; color:#888; line-height:1.5; }

    #newsSection { padding:120px 20px; background:#050505; border-top:1px solid #111; }
    .news-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(320px, 1fr)); gap:20px; max-width:1200px; margin:60px auto 0; }
    .news-card { background:#0a0a0a; border:1px solid #1a1a1a; border-radius:20px; transition:0.4s; cursor:pointer; overflow:hidden; display:flex; flex-direction:column; }
    .news-card:hover { transform:translateY(-6px); background:#0f0f0f; }
    .news-card-top { padding:28px 28px 0; }
    .news-card-bottom { padding:0 28px 24px; margin-top:auto; }
    .news-card.ai{border-top:3px solid #00ffff;} .news-card.estate{border-top:3px solid #ffcc00;} .news-card.policy{border-top:3px solid #ff5050;} .news-card.finance{border-top:3px solid #fff;} .news-card.us{border-top:3px solid #4488ff;} .news-card.kr{border-top:3px solid #ff4466;}
    .news-cat { font-size:10px; font-weight:800; letter-spacing:3px; margin-bottom:14px; display:block; font-family:'Cormorant Garamond',serif; }
    .cat-ai{color:#00ffff;} .cat-estate{color:#ffcc00;} .cat-policy{color:#ff5050;} .cat-finance{color:#aaa;} .cat-us{color:#4488ff;} .cat-kr{color:#ff4466;}
    .news-headlines { list-style:none; padding:0; margin:0 0 16px; }
    .news-headlines li { font-size:13px; color:#ccc; line-height:1.6; padding:8px 0; border-bottom:1px solid #1a1a1a; cursor:pointer; transition:0.2s; display:flex; align-items:flex-start; gap:8px; }
    .news-headlines li:last-child { border-bottom:none; }
    .news-headlines li:hover { color:#fff; padding-left:4px; }
    .news-headlines li::before { content:'›'; color:#444; flex-shrink:0; }
    .news-footer { display:flex; justify-content:space-between; align-items:center; padding-top:14px; border-top:1px solid #111; }
    .news-more { font-size:11px; color:#555; text-decoration:none; letter-spacing:1px; transition:0.2s; font-family:'Cormorant Garamond',serif; }
    .news-more:hover { color:#00ffff; }
    .news-dot { width:6px; height:6px; border-radius:50%; animation:blink 2s infinite; }
    .dot-ai{background:#00ffff;} .dot-estate{background:#ffcc00;} .dot-policy{background:#ff5050;} .dot-finance{background:#aaa;} .dot-us{background:#4488ff;} .dot-kr{background:#ff4466;}
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.2;} }

    #auctionSection { padding:100px 20px; background:#000; border-top:1px solid #111; text-align:center; }
    .auction-wrap { display:flex; flex-wrap:wrap; justify-content:center; gap:25px; margin-top:50px; max-width:1000px; margin-left:auto; margin-right:auto; }
    .auction-btn { display:flex; flex-direction:column; align-items:center; justify-content:center; width:260px; padding:36px 28px; border-radius:24px; text-decoration:none; transition:0.4s; position:relative; overflow:hidden; gap:12px; }
    .auction-btn::before { content:''; position:absolute; inset:0; opacity:0; transition:0.4s; }
    .auction-btn:hover { transform:translateY(-8px); }
    .auction-btn:hover::before { opacity:1; }
    .auction-btn.court { background:#0a0a14; border:1px solid #334; }
    .auction-btn.court:hover { border-color:#4466ff; box-shadow:0 20px 50px rgba(60,80,255,0.25); }
    .auction-btn.court::before { background:radial-gradient(circle at 50% 0%,rgba(60,80,255,0.08),transparent 70%); }
    .auction-btn.lock { background:#0a1410; border:1px solid #343; }
    .auction-btn.lock:hover { border-color:#44ff88; box-shadow:0 20px 50px rgba(60,255,100,0.25); }
    .auction-btn.lock::before { background:radial-gradient(circle at 50% 0%,rgba(60,255,100,0.08),transparent 70%); }
    .auction-btn.drug { background:#0a0a14; border:1px solid #433; }
    .auction-btn.drug:hover { border-color:#ff6644; box-shadow:0 20px 50px rgba(255,80,60,0.25); }
    .auction-btn.drug::before { background:radial-gradient(circle at 50% 0%,rgba(255,80,60,0.08),transparent 70%); }
    .auction-icon { font-size:2.2rem; }
    .auction-label { font-size:10px; font-weight:800; letter-spacing:3px; font-family:'Cormorant Garamond',serif; }
    .auction-label.court-label{color:#4466ff;} .auction-label.lock-label{color:#44ff88;} .auction-label.drug-label{color:#ff6644;}
    .auction-title { font-size:18px; font-weight:800; color:#fff; }
    .auction-desc { font-size:12px; color:#666; line-height:1.6; }
    .auction-arrow { font-size:11px; letter-spacing:2px; font-family:'Cormorant Garamond',serif; }
    .auction-arrow.court-arrow{color:#4466ff;} .auction-arrow.lock-arrow{color:#44ff88;} .auction-arrow.drug-arrow{color:#ff6644;}

    /* 체크리스트 모달 */
    #checkModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:1000; backdrop-filter:blur(10px); overflow-y:auto; padding:40px 20px; }
    #checkModal.active { display:flex; align-items:flex-start; justify-content:center; }
    .modal-box { background:#0a0a0a; border:1px solid #222; border-radius:24px; max-width:700px; width:100%; padding:50px 40px; position:relative; margin:auto; }
    .modal-close { position:absolute; top:20px; right:24px; font-size:24px; color:#555; cursor:pointer; transition:0.2s; background:none; border:none; color:#555; }
    .modal-close:hover { color:#fff; }
    .modal-title { font-size:28px; font-weight:900; margin-bottom:6px; }
    .modal-sub { font-size:13px; color:#555; margin-bottom:30px; }
    .progress-text { font-size:12px; color:#555; font-family:'Cormorant Garamond',serif; margin-bottom:8px; }
    .progress-bar { height:4px; background:#1a1a1a; border-radius:2px; margin-bottom:30px; }
    .progress-fill { height:100%; background:#00ffff; border-radius:2px; transition:0.4s; }
    .checklist-category { margin-bottom:28px; }
    .checklist-cat-title { font-size:10px; font-weight:800; letter-spacing:3px; color:#00ffff; font-family:'Cormorant Garamond',serif; margin-bottom:12px; }
    .checklist-item { display:flex; align-items:center; gap:14px; padding:12px 16px; background:#111; border:1px solid #1a1a1a; border-radius:10px; margin-bottom:8px; cursor:pointer; transition:0.3s; }
    .checklist-item:hover { border-color:#333; }
    .checklist-item.done { border-color:#00ffff22; background:#00ffff08; }
    .checklist-item.done .check-label { color:#444; text-decoration:line-through; }
    .check-box { width:20px; height:20px; border:2px solid #333; border-radius:5px; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:0.3s; font-size:12px; color:transparent; }
    .checklist-item.done .check-box { background:#00ffff; border-color:#00ffff; color:#000; }
    .check-label { font-size:14px; color:#ccc; }

    #contact { padding:100px 20px; text-align:center; background:#050505; border-top:1px solid #111; display:flex; flex-direction:column; align-items:cen
